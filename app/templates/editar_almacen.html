{% extends 'base.html' %}

{% block title %}Editar Almacén - Inventario Pro{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-6 col-md-8">
        <div class="premium-card">
            <div class="card-header-premium d-flex justify-content-between align-items-center">
                <h2 class="card-title-premium h4"><i class="fa-solid fa-pen text-primary me-2"></i> Editar Almacén #{{ a.idWarehouse }}</h2>
                <a href="/almacenes" class="btn btn-sm btn-light"><i class="fa-solid fa-arrow-left me-1"></i> Volver</a>
            </div>
            
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                <form action="/almacenes/editar/{{ a.idWarehouse }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="name">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ a.Name }}" required>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="country">País <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="country" name="country" value="{{ a.Country }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="city">Ciudad <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ a.City }}" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2 pt-2 border-top">
                        <a href="/almacenes" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-check me-1"></i> Actualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
