<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacenes - Proyecto Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Proyecto Inventario</h1>
            <a href="/" class="back-link">← Volver al Hub</a>
        </div>
    </header>
    <main class="container">
        <div class="table-header">
            <h2>Listado de Almacenes</h2>
            <a href="/almacenes/nuevo" class="btn btn-create">+ Nuevo Almacén</a>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>País</th>
                    <th>Ciudad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for a in almacenes %}
                <tr>
                    <td>{{ a.idWarehouse }}</td>
                    <td>{{ a.Name }}</td>
                    <td>{{ a.Country }}</td>
                    <td>{{ a.City }}</td>
                    <td>
                        <div class="actions">
                            <a href="/almacenes/editar/{{ a.idWarehouse }}" class="btn btn-edit">Editar</a>
                            <form action="/almacenes/eliminar/{{ a.idWarehouse }}" method="POST" style="display:inline;">
                                <button type="submit" class="btn btn-delete"
                                    onclick="return confirm('¿Eliminar este almacén?')">Borrar</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
