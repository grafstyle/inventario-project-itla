{% extends 'base.html' %}

{% block title %}Nuevo Almacén - Inventario Pro{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-6 col-md-8">
        <div class="premium-card">
            <div class="card-header-premium d-flex justify-content-between align-items-center">
                <h2 class="card-title-premium h4"><i class="fa-solid fa-warehouse text-primary me-2"></i> Nuevo Almacén</h2>
                <a href="/almacenes" class="btn btn-sm btn-light"><i class="fa-solid fa-arrow-left me-1"></i> Volver</a>
            </div>
            
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                <form action="/almacenes/nuevo" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="nombre">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Almacén Central" required autofocus>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="pais">País <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="pais" name="pais" placeholder="Ej: USA" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="ciudad">Ciudad <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="ciudad" name="ciudad" placeholder="Ej: New York" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2 pt-2 border-top">
                        <a href="/almacenes" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-check me-1"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
