<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <header class="header">
        <div class="header-content">
            <h1>Proyecto Inventario</h1>
            <a href="/productos" class="back-link">← Volver a Productos</a>
        </div>
    </header>

    <main class="container">
        <h2>Nuevo Producto</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form action="/productos/nuevo" method="POST" class="form">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" name="name" placeholder="Nombre del producto" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" name="description" placeholder="Descripción">
            </div>
            <div class="form-group">
                <label>Precio *</label>
                <input type="number" name="price" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Costo *</label>
                <input type="number" name="cost" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-actions">
                <a href="/productos" class="btn btn-cancel">Cancelar</a>
                <button type="submit" class="btn btn-create">Guardar</button>
            </div>
        </form>
    </main>

</body>

</html>
