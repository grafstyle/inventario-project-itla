<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Stock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Proyecto Inventario</h1>
            <a href="/inventario" class="back-link">← Volver a Inventario</a>
        </div>
    </header>
    <main class="container">
        <h2>Asignar Stock</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form action="/inventario/nuevo" method="POST" class="form">
            <div class="form-group">
                <label>Producto *</label>
                <select name="idProduct" required>
                    <option value="">Selecciona un producto</option>
                    {% for p in productos %}
                    <option value="{{ p.idProduct }}">{{ p.Name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Almacén *</label>
                <select name="idWarehouse" required>
                    <option value="">Selecciona un almacén</option>
                    {% for a in almacenes %}
                    <option value="{{ a.idWarehouse }}">{{ a.Name }} — {{ a.City }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Stock *</label>
                <input type="number" name="stock" placeholder="0" min="0" required>
            </div>
            <div class="form-actions">
                <a href="/inventario" class="btn btn-cancel">Cancelar</a>
                <button type="submit" class="btn btn-create">Guardar</button>
            </div>
        </form>
    </main>
</body>
</html>
