{% extends 'base.html' %}

{% block title %}Asignar Inventario - Inventario Pro{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-6 col-md-8">
        <div class="premium-card">
            <div class="card-header-premium d-flex justify-content-between align-items-center">
                <h2 class="card-title-premium h4"><i class="fa-solid fa-truck-ramp-box text-primary me-2"></i> Asignar Stock de Producto a Almacén</h2>
                <a href="/inventario" class="btn btn-sm btn-light"><i class="fa-solid fa-arrow-left me-1"></i> Volver</a>
            </div>
            
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                <form action="/inventario/nuevo" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="id_producto">Producto <span class="text-danger">*</span></label>
                        <select class="form-select" id="id_producto" name="id_producto" required autofocus>
                            <option value="" disabled selected>-- Seleccione un producto --</option>
                            {% for p in productos %}
                            <option value="{{ p.id_producto }}">{{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" for="id_almacen">Almacén de Destino <span class="text-danger">*</span></label>
                        <select class="form-select" id="id_almacen" name="id_almacen" required>
                            <option value="" disabled selected>-- Seleccione un almacén --</option>
                            {% for a in almacenes %}
                            <option value="{{ a.id_almacen }}">{{ a.nombre }} - {{ a.ciudad }}, {{ a.pais }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="cantidad">Cantidad (Stock Inicial) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-cubes"></i></span>
                            <input type="number" class="form-control border-start-0 ps-0" id="cantidad" name="cantidad" placeholder="0" min="0" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2 pt-2 border-top">
                        <a href="/inventario" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-check me-1"></i> Guardar Asignación</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
